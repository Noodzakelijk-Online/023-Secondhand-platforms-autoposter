name: Supply Chain

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project dependencies
        run: python -m pip install -r requirements.txt

      - name: Install audit tooling
        run: python -m pip install pip-audit==2.9.0

      - name: Run dependency vulnerability audit
        run: python scripts/audit_dependencies.py
